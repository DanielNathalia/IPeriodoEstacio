<!DOCTYPE HTML>
<html lang ='pt-BR';>
    
<head>
    <meta charset="utf-8">
    <title>Básico</title>
</head>
<body>
    <script type="text/javascript">
        var resultado, n1, n2, n3 ;

        n1= prompt ("Informe o primeiro número: ") ;
        n1= eval (n1) ;

        n2= prompt ("Informe o segundo número: ") ;
        n2= eval (n2) ; 

        n3= prompt ("Informe o terceiro número: ") ; 
        n3= eval (n3) ;

        resultado  = (n1 + n2 + n3) ; 
        document.write ('X: ' + resultado);
        
    </script>
</body>

<!doctype html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<title>Incorporando Javascript em Páginas HTML</title>

</head>
<!-- Incorporando códigos Javascript diretamente na página -->
    <script type="text/javascript">
    
    function faz (n){
        var total = 0;
        for (var x = 0; x < num; x++) {
            total += x;
        }
        return total;
    }
    console.log(total);
    
    </script>
